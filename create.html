<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать объявление - Brikc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="display: flex; justify-content: center; padding-top: 50px;">
        <form class="modal-content" id="ad-form" style="display: flex; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 id="page-title" style="margin: 0">Новое объявление</h2>
            <input type="text" id="form-title" placeholder="Название" required>
            <textarea id="form-description" placeholder="Описание" rows="6" required></textarea>
            <input type="number" id="form-price" placeholder="Цена (₽)" required>
            <input type="text" id="form-contact" placeholder="Контактные данные" required>
            <label style="font-size: 0.9rem; color: var(--text-muted);">Картинка объявления:</label>
<div style="display: flex; gap: 8px;">
    <input type="text" id="search-image-query" placeholder="Что искать? (например: iphone, книга)">
    <button type="button" class="btn-secondary" id="search-image-btn">Найти фото</button>
</div>

<div id="image-search-results" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto;"></div>

<input type="hidden" id="form-image-url">
<div id="selected-image-preview" style="margin-top: 10px; display: none;">
    <span style="font-size: 0.8rem; color: var(--text-muted);">Выбрано:</span>
    <img id="preview-img" src="" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; display: block; margin-top: 5px; border: 2px solid var(--primary);">
</div>
            <input type="file" id="form-image-file" accept="image/*">
            <select id="form-category" required>
                <option value="учебники">Учебники</option>
                <option value="электроника">Электроника</option>
                <option value="одежда">Одежда</option>
                <option value="другое">Другое</option>
            </select>
            <div class="actions">
                <button type="submit" class="btn-primary" style="flex-grow: 1;">Сохранить</button>
                <button type="button" class="btn-secondary" onclick="location.href='index.html'">Отмена</button>
            </div>
        </form>
    </div>
    <script type="module" src="create.js"></script>
</body>
</html>
